<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/emma-planner-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>엠마 플래너</title>
    <!-- GitHub Pages에서 /<repo>/<route> 딥링크(직접진입/새로고침) 시 404가 나는 문제 해결:
         public/404.html이 URL을 querystring으로 바꾸고, 이 스크립트가 원래 경로로 복구합니다. -->
    <script type="text/javascript">
      ;(function () {
        const search = window.location.search
        if (!search.startsWith('?/')) return
        const restored = search
          .slice(1)
          .split('&')
          .map((s) => s.replace(/~and~/g, '&'))
          .join('?')
        // base(= /<repo>/)를 유지한 채로, 원래 라우트만 붙여서 복구
        const basePath = window.location.pathname.endsWith('/')
          ? window.location.pathname
          : window.location.pathname + '/'
        const restoredPath = restored.startsWith('/') ? restored.slice(1) : restored
        window.history.replaceState(
          null,
          '',
          basePath + restoredPath + window.location.hash,
        )
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
