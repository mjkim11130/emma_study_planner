<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./emma-planner-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f8fafc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="엠마 플래너" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>엠마 플래너</title>
    <script type="text/javascript">
      // GitHub Pages SPA 딥링크 리다이렉트:
      // /<repo>/<route> → /<repo>/?/<route> 로 바꿔서 index.html이 원래 경로로 복구하게 합니다.
      ;(function () {
        const l = window.location
        const segments = l.pathname.split('/')
        const repo = segments.length > 1 ? segments[1] : ''
        const newPath = '/' + repo + '/?/' + segments.slice(2).join('/')
        const newUrl =
          newPath +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        l.replace(newUrl)
      })()
    </script>
  </head>
  <body></body>
</html>
