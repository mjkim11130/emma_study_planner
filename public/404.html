<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="%BASE_URL%emma-planner-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>엠마 플래너</title>
    <script type="text/javascript">
      // GitHub Pages SPA 딥링크 리다이렉트:
      // /<repo>/<route> → /<repo>/?/<route> 로 바꿔서 index.html이 원래 경로로 복구하게 합니다.
      ;(function () {
        const l = window.location
        const segments = l.pathname.split('/')
        const repo = segments.length > 1 ? segments[1] : ''
        const newPath = '/' + repo + '/?/' + segments.slice(2).join('/')
        const newUrl =
          newPath +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        l.replace(newUrl)
      })()
    </script>
  </head>
  <body></body>
</html>
